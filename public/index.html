<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://www.google.com/recaptcha/api.js" async defer></script>
        <title>Document</title>
</head>
<body>
    <h1>Welcome to the PSB Student Management System</h1>
    <form id="formPSB">
        <input type="text" name="name" placeholder="Student Name" required>
        <select name="gender" required>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <input type="number" name="memorize" placeholder="Memorize Score" required>
        <input type="text" name="parent" placeholder="Parent Name" required>
        <div class="g-recaptcha" data-sitekey="6LfK46UsAAAAAF_H3uxtJoslhBxOA9suSWMg616h"></div>
        <button type="submit">Submit</button>
    </form>

    <h3 id="statusPesan"></h3>

    <script>
        const form = document.getElementById("formPSB");

        const statusPesan = document.getElementById("statusPesan");

        form.onsubmit = async (e) => {
            e.preventDefault();

            statusPesan.innerText = "Sedang Memproses...";
            statusPesan.style.color = "blue";

            const formData = new FormData(form);

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    body: formData
                })

                const result = await response.json();

                if (response.ok) {
                    statusPesan.innerText = "successfully: " + result.message;
                    statusPesan.style.color = "green";
                    form.reset();
                    grecaptcha.reset();
                } else {
                    alert(result.error);
                    statusPesan.innerText = "Failed: " + (result.error || "error");
                    statusPesan.style.color = "red"; 
                }
            } catch (err) {
                statusPesan.innerText = "Failed connect to server.";
                statusPesan.style.color = "red";
            }
        };
    </script>
</body>
</html>
